syntax = "proto3";

package tenet.v1;

option go_package = "github.com/tenet/orchestrator/internal/gateway/gen/tenet/v1;tenetv1";

service TenetOrchestrator {
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
}

service TenetWorker {
  rpc GenerateThought(GenerateThoughtRequest) returns (GenerateThoughtResponse);
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message RegisterAgentRequest {
  string agent_id = 1;
  int32 listen_port = 2;
  int32 max_concurrency = 3;
}

message RegisterAgentResponse {
  bool accepted = 1;
  string orchestrator_id = 2;
  string message = 3;
}

message GenerateThoughtRequest {
  string session_id = 1;
  string task_id = 2;
  string model = 3;
  double temperature = 4;
  string system_prompt = 5;
  repeated Message messages = 6;
  repeated ToolDefinition tools = 7;
}

message GenerateThoughtResponse {
  string thought = 1;
  repeated ToolCall tool_calls = 2;
  bool is_final = 3;
  string finish_reason = 4;
  TokenUsage usage = 5;
  repeated ToolDefinition discovered_tools = 6;
}

message ExecuteToolRequest {
  string session_id = 1;
  int64 fencing_token = 2;
  string tool_name = 3;
  string arguments = 4;
}

message ExecuteToolResponse {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
  bool is_error = 4;
  int64 duration_ms = 5;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  int32 worker_count = 2;
  int64 uptime_seconds = 3;
}

message Message {
  string role = 1;
  string content = 2;
  string tool_call_id = 3;
  repeated ToolCall tool_calls = 4;
}

message ToolCall {
  string call_id = 1;
  string tool_name = 2;
  string arguments = 3;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string parameters_schema = 3;
}

message TokenUsage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
  double cost_usd = 4;
}
